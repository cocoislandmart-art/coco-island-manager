<script type="text/babel">
const {useState, useEffect} = React;

const WORKER = "https://coco-zoho-proxy.cocoislandmart.workers.dev";
const AIDS = {pan:"5644395000000008002", sales:"5142150000000008002"};

function getApiKey() { return localStorage.getItem("coco_api_key") || ""; }

const C = {
  bg:"#0A0A0F", surface:"#13131A", border:"#1E1E2A", borderHover:"#2E2E40",
  text:"#E2DDD6", muted:"#5A5A6E", accent:"#6EE7B7", accentDim:"#1A3D30",
  warn:"#FCD34D", warnDim:"#3D3010", danger:"#F87171", dangerDim:"#3D1010",
  blue:"#60A5FA", blueDim:"#102040",
};

const EMAIL_SYSTEM = `You are a professional customer service representative for Coco Island Mart, an online store. Reply to customer emails in English only. Be warm, professional, and concise (under 150 words). Identify the issue type and respond accordingly:
1. Order/Logistics - acknowledge and advise checking "My Orders" page
2. Returns/Refunds - confirm receipt, request order number and photos, 3 business days processing
3. Product Inquiry - answer helpfully, follow up if unsure
4. Complaint - apologize sincerely, promise to follow up
Sign off as: "Best regards,\nCoco Island Mart Customer Service Team"`;

const PRODUCT_SYSTEM = `You are a professional e-commerce copywriter. Generate compelling product copy based on product information.
Format: [Product Title] under 15 words\n[Key Features] 3 core selling points\n[Product Description] 100-150 words, bilingual Chinese/English separated by ---\n[SEO Tags] 5 keywords\nTone: professional, attractive, value-focused`;

const MARKETING_SYSTEM = `You are an e-commerce marketing copywriter for Coco Island Mart. Generate local delivery promotional copy. Requirements: highlight same-day/next-day delivery advantage, friendly tone, bilingual Chinese/English. Format: Chinese version first, then English version, separated by ---.`;

async function callClaude({system, userContent}) {
  try {
    const res = await fetch(WORKER + "/claude", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1000,
        system,
        messages: [{role:"user", content: userContent}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.content?.[0]?.text || "";
  } catch(e) {
    throw new Error(e.message);
  }
}

function Btn({children, onClick, variant="primary", disabled, style={}}) {
  const base = {border:"none", borderRadius:6, cursor:disabled?"not-allowed":"pointer", fontSize:12, letterSpacing:.5, padding:"8px 16px", transition:"all .15s", fontWeight:500};
  const v = {
    primary: {background:disabled?C.border:C.accent, color:disabled?C.muted:"#0A0A0F"},
    ghost: {background:"transparent", color:C.muted, border:`1px solid ${C.border}`}
  };
  return <button onClick={onClick} disabled={disabled} style={{...base, ...v[variant], ...style}}>{children}</button>;
}

function Card({children, style={}}) {
  return <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:20, ...style}}>{children}</div>;
}

function Label({zh, en}) {
  return <span style={{fontSize:11, color:C.muted, letterSpacing:2, textTransform:"uppercase"}}>{zh} <span style={{opacity:.5}}>/ {en}</span></span>;
}

function TA({value, onChange, placeholder, rows=4}) {
  const [f,setF] = useState(false);
  return <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows}
    onFocus={()=>setF(true)} onBlur={()=>setF(false)}
    style={{width:"100%", background:C.bg, border:`1px solid ${f?C.borderHover:C.border}`, borderRadius:8, padding:"12px", color:C.text, fontSize:13, resize:"vertical", outline:"none", lineHeight:1.6, boxSizing:"border-box", transition:"border-color .15s"}}/>;
}

function CopyBtn({text}) {
  const [c,setC] = useState(false);
  return <Btn variant="ghost" style={{fontSize:11, padding:"4px 12px"}}
    onClick={()=>{navigator.clipboard.writeText(text); setC(true); setTimeout(()=>setC(false),2000)}}>
    {c?"✓ Copied":"Copy"}
  </Btn>;
}

const tabs = [

function EmailTab() {
  const [account, setAccount] = useState("sales");
  const [emails, setEmails] = useState([]);
  const [loadingInbox, setLoadingInbox] = useState(false);
  const [selectedEmail, setSelectedEmail] = useState(null);
  const [input, setInput] = useState("");
  const [reply, setReply] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [tokenStatus, setTokenStatus] = useState("");

  function fmt(ts) {
    if (!ts) return "";
    const d = new Date(parseInt(ts)), diff = Date.now() - d;
    return diff < 86400000 ? d.toLocaleTimeString("en-US", {hour:"2-digit", minute:"2-digit"}) : d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
  }

  async function loadInbox(acc) {
    setLoadingInbox(true); setEmails([]); setSelectedEmail(null); setInput(""); setReply("");
    try {
      const aid = AIDS[acc];
      const r = await fetch(`${WORKER}/zoho/accounts/${aid}/messages/view?limit=20&start=0&account=${acc}`);
      const d = await r.json();
      setEmails(d.data || []);
    } catch(e) { setErr("Failed to load inbox: " + e.message); }
    setLoadingInbox(false);
  }

  async function selectEmail(email) {
    setSelectedEmail(email); setInput(""); setReply("");
    try {
      const aid = AIDS[account];
      const r = await fetch(`${WORKER}/zoho/accounts/${aid}/messages/${email.messageId}/content?account=${account}`);
      const d = await r.json();
      const raw = (d.data && (d.data.content || d.data.body)) || email.summary || "";
      const tmp = document.createElement("div"); tmp.innerHTML = raw;
      const plain = tmp.textContent || tmp.innerText || "";
      setInput(plain.substring(0, 600));
    } catch { setInput(email.summary || ""); }
  }

  async function switchAccount(acc) {
    setAccount(acc); setReply(""); setErr("");
    await loadInbox(acc);
  }

  useEffect(() => { loadInbox("sales"); }, []);

  async function gen() {
    setLoading(true); setReply(""); setErr("");
    try {
      const t = await callClaude({system: EMAIL_SYSTEM, userContent: `Please reply to this customer email:\n\n${input}`});
      setReply(t.trim());
    } catch(e) { setErr("Generation failed: " + e.message); }
    setLoading(false);
  }

  return <div style={{display:"grid", gridTemplateColumns:"220px 1fr", gap:12, minHeight:500}}>
    {/* LEFT: Inbox */}
    <div style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, display:"flex", flexDirection:"column", overflow:"hidden"}}>
      <div style={{padding:"12px", borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <span style={{fontSize:11, color:C.muted, letterSpacing:1, textTransform:"uppercase"}}>Inbox</span>
        <button onClick={()=>loadInbox(account)} style={{background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:14}}>↻</button>
      </div>
      <div style={{padding:"8px", borderBottom:`1px solid ${C.border}`, display:"flex", gap:4}}>
        {["sales","pan"].map(acc => <button key={acc} onClick={()=>switchAccount(acc)}
          style={{flex:1, padding:"4px", borderRadius:4, cursor:"pointer", fontSize:10, border:"none", background:account===acc?C.accentDim:C.bg, color:account===acc?C.accent:C.muted}}>
          {acc}@
        </button>)}
      </div>
      <div style={{flex:1, overflowY:"auto"}}>
        {loadingInbox && <div style={{padding:20, textAlign:"center", color:C.muted, fontSize:12}}>Loading...</div>}
        {!loadingInbox && emails.length === 0 && <div style={{padding:20, textAlign:"center", color:C.muted, fontSize:12}}>No emails</div>}
        {emails.map((e,i) => <div key={i} onClick={()=>selectEmail(e)}
          style={{padding:"10px 12px", borderBottom:`1px solid ${C.border}`, cursor:"pointer", background:selectedEmail?.messageId===e.messageId?C.accentDim:C.bg, borderLeft:`2px solid ${selectedEmail?.messageId===e.messageId?C.accent:"transparent"}`}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:3}}>
            <span style={{fontSize:11, color:C.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:130}}>{e.fromAddress||e.sender||"Unknown"}</span>
            <span style={{fontSize:10, color:C.muted, flexShrink:0}}>{fmt(e.receivedTime||e.sentDateInGMT)}</span>
          </div>
          <div style={{fontSize:11, color:C.muted, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{e.subject||"(no subject)"}</div>
        </div>)}
      </div>
    </div>

    {/* RIGHT: Reply */}
    <div>
      <div style={{marginBottom:12}}>
        <Label zh="自动回邮" en="AI Auto-Reply"/>
        <p style={{fontSize:11, color:C.muted, margin:"4px 0 0"}}>Claude AI · Zoho Mail · Cloudflare 自动续期</p>
      </div>
      {selectedEmail && <Card style={{marginBottom:10, padding:"12px 14px"}}>
        <div style={{fontSize:11, color:C.muted, marginBottom:3}}>From: {selectedEmail.fromAddress||selectedEmail.sender}</div>
        <div style={{fontSize:13, color:C.text, fontWeight:500}}>{selectedEmail.subject||"(no subject)"}</div>
      </Card>}
      <div style={{marginBottom:10}}><TA value={input} onChange={setInput} placeholder="Select an email from inbox, or paste customer message..." rows={4}/></div>
      <Btn onClick={gen} disabled={loading||!input.trim()} style={{width:"100%", padding:"11px", marginBottom:10}}>
        {loading ? "Generating..." : "生成自动回复 / Generate Reply"}
      </Btn>
      {err && <p style={{color:C.danger, fontSize:13, marginBottom:10}}>{err}</p>}
      {reply && <Card style={{animation:"fadeIn .3s ease"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
          <Label zh="AI 回复" en="Reply"/>
          <CopyBtn text={reply}/>
        </div>
        <p style={{fontSize:13, lineHeight:1.8, color:"#C8C5BF", margin:0, whiteSpace:"pre-wrap"}}>{reply}</p>
      </Card>}
    </div>
  </div>;
}

function ProductsTab() {
  const [view, setView] = useState("list");
  const [shopifyProducts, setShopifyProducts] = useState([]);
  const [loadingProducts, setLoadingProducts] = useState(false);
  const [editingProduct, setEditingProduct] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [saving, setSaving] = useState(false);
  const [mode, setMode] = useState("manual");
  const [form, setForm] = useState({name:"", category:"", price:"", comparePrice:"", stock:"", sku:"", barcode:"", weight:"", vendor:"Coco Island Mart", tags:"", keywords:""});
  const [imgDesc, setImgDesc] = useState("");
  const [bulk, setBulk] = useState("");
  const [gen, setGen] = useState(null);
  const [loading, setLoading] = useState(false);
  const [imgFile, setImgFile] = useState(null);
  const [imgPrev, setImgPrev] = useState(null);
  const [searchQ, setSearchQ] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [msg, setMsg] = useState("");

  const inp = {width:"100%", background:C.bg, border:`1px solid ${C.border}`, borderRadius:6, padding:"9px 12px", color:C.text, fontSize:12, outline:"none", boxSizing:"border-box"};

  function generateSKU(name, category) {
    const prefix = (category||"GEN").substring(0,3).toUpperCase();
    const mid = (name||"PROD").replace(/\s+/g,"").substring(0,4).toUpperCase();
    const num = Math.floor(Math.random()*9000)+1000;
    return `${prefix}-${mid}-${num}`;
  }

  function generateUPC() {
    const digits = Array.from({length:11}, ()=>Math.floor(Math.random()*10));
    const sum = digits.reduce((a,d,i)=>a+d*(i%2===0?3:1),0);
    const check = (10-sum%10)%10;
    return [...digits, check].join('');
  }

  async function loadShopifyProducts() {
    setLoadingProducts(true); setMsg("");
    try {
      const res = await fetch(WORKER + "/shopify/products?limit=50");
      const data = await res.json();
      setShopifyProducts(data.products || []);
    } catch(e) { setMsg("Failed to load: " + e.message); }
    setLoadingProducts(false);
  }

  useEffect(() => { loadShopifyProducts(); }, []);

  function startEdit(product) {
    setEditingProduct(product);
    const v = product.variants?.[0] || {};
    setEditForm({
      title: product.title || "",
      status: product.status || "draft",
      vendor: product.vendor || "",
      product_type: product.product_type || "",
      tags: product.tags || "",
      price: v.price || "",
      compare_at_price: v.compare_at_price || "",
      sku: v.sku || "",
      barcode: v.barcode || "",
      inventory_quantity: v.inventory_quantity ?? "",
      weight: v.weight || "",
    });
    setView("edit");
  }

  async function saveEdit() {
    setSaving(true); setMsg("");
    try {
      // Update product fields
      const productRes = await fetch(`${WORKER}/shopify/products/${editingProduct.id}`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ product: {
          id: editingProduct.id,
          title: editForm.title,
          status: editForm.status,
          vendor: editForm.vendor,
          product_type: editForm.product_type,
          tags: editForm.tags,
        }})
      });
      // Update variant (price, inventory)
      const variantId = editingProduct.variants?.[0]?.id;
      if (variantId) {
        await fetch(`${WORKER}/shopify/variants/${variantId}`, {
          method: "PUT",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ variant: {
            id: variantId,
            price: editForm.price,
            compare_at_price: editForm.compare_at_price || null,
            sku: editForm.sku,
            barcode: editForm.barcode,
            weight: parseFloat(editForm.weight) || 0,
            inventory_quantity: parseInt(editForm.inventory_quantity) || 0,
          }})
        });
      }
      setMsg("✅ Saved successfully!");
      await loadShopifyProducts();
      setTimeout(() => setView("list"), 1000);
    } catch(e) { setMsg("❌ Save failed: " + e.message); }
    setSaving(false);
  }

  async function deleteProduct(productId) {
    if (!confirm("Delete this product from Shopify?")) return;
    try {
      await fetch(`${WORKER}/shopify/products/${productId}`, { method: "DELETE" });
      setMsg("✅ Deleted!");
      await loadShopifyProducts();
    } catch(e) { setMsg("❌ " + e.message); }
  }

  async function toggleStatus(product) {
    const newStatus = product.status === "active" ? "draft" : "active";
    try {
      await fetch(`${WORKER}/shopify/products/${product.id}`, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ product: { id: product.id, status: newStatus }})
      });
      await loadShopifyProducts();
    } catch(e) { setMsg("❌ " + e.message); }
  }

  function handleImg(e) {
    const f = e.target.files[0]; if(!f) return;
    setImgFile(f);
    const r = new FileReader(); r.onload = ev=>setImgPrev(ev.target.result); r.readAsDataURL(f);
  }

  async function generateDesc() {
    setLoading(true); setGen(null);
    try {
      let uc;
      if(mode==="image" && imgFile) {
        const b64 = await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.readAsDataURL(imgFile)});
        uc = [{type:"image", source:{type:"base64", media_type:imgFile.type, data:b64}}, {type:"text", text:`Please generate complete product copy based on this product image. ${imgDesc?"Additional notes: "+imgDesc:""}`}];
      } else if(mode==="bulk") {
        uc = `Here are multiple products. Generate copy for each, separated by =====:\n\n${bulk}`;
      } else {
        uc = `Product Name: ${form.name}\nCategory: ${form.category}\nPrice: ${form.price}\nKeywords: ${form.keywords}\nPlease generate complete product copy.`;
      }
      const result = await callClaude({system:PRODUCT_SYSTEM, userContent:uc});
      setGen(result);
      const keywordMatch = result.match(/\[High-Traffic SEO Keywords\]([\s\S]*?)\[/);
      if (keywordMatch) {
        const kwSection = keywordMatch[1];
        const tagsMatch = kwSection.match(/Tags:\s*(.+)/);
        if (tagsMatch) setForm(f=>({...f, tags: tagsMatch[1].trim()}));
        const primaryMatch = kwSection.match(/Primary:\s*(.+)/);
        if (primaryMatch) setForm(f=>({...f, keywords: primaryMatch[1].trim()}));
      }
      setView("generated");
    } catch(e) {setGen("Generation failed: "+e.message); setView("generated");}
    setLoading(false);
  }

  async function uploadToShopify() {
    setLoading(true);
    try {
      const sku = form.sku || generateSKU(form.name, form.category);
      const barcode = form.barcode || generateUPC();
      const product = {
        title: form.name || "New Product",
        body_html: gen || "",
        vendor: form.vendor || "Coco Island Mart",
        product_type: form.category || "",
        status: "draft",
        tags: form.tags || form.keywords || "",
        variants: [{
          price: form.price?.replace(/[^0-9.]/g,"") || "0",
          compare_at_price: form.comparePrice?.replace(/[^0-9.]/g,"") || undefined,
          sku, barcode,
          weight: parseFloat(form.weight)||0,
          weight_unit: "kg",
          inventory_quantity: parseInt(form.stock)||0,
          inventory_management: "shopify"
        }]
      };
      const res = await fetch(WORKER + "/shopify/products", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(product)
      });
      const data = await res.json();
      if (data.product) {
        alert("✅ Uploaded to Shopify as Draft!\nProduct ID: " + data.product.id + "\nGo to Shopify admin to publish.");
        await loadShopifyProducts();
        setView("list");
      } else {
        alert("❌ Upload failed: " + JSON.stringify(data.errors || data));
      }
    } catch(e) { alert("❌ Error: " + e.message); }
    setLoading(false);
  }

  const filtered = shopifyProducts.filter(p => {
    const matchSearch = !searchQ || p.title?.toLowerCase().includes(searchQ.toLowerCase()) || p.tags?.toLowerCase().includes(searchQ.toLowerCase());
    const matchStatus = filterStatus === "all" || p.status === filterStatus;
    return matchSearch && matchStatus;
  });

  // LIST VIEW
  if (view === "list") return <div>
    <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16}}>
      <div>
        <Label zh="产品管理" en="Product Manager"/>
        <p style={{fontSize:12, color:C.muted, margin:"6px 0 0"}}>{shopifyProducts.length} products from Shopify · Live sync</p>
      </div>
      <div style={{display:"flex", gap:8}}>
        <button onClick={loadShopifyProducts} style={{background:"transparent", border:`1px solid ${C.border}`, borderRadius:6, color:C.muted, cursor:"pointer", fontSize:12, padding:"6px 12px"}}>↻ Refresh</button>
        <Btn onClick={()=>{setView("add"); setGen(null); setForm({name:"", category:"", price:"", comparePrice:"", stock:"", sku:"", barcode:"", weight:"", vendor:"Coco Island Mart", tags:"", keywords:""});}}>+ Add Product</Btn>
      </div>
    </div>

    {msg && <div style={{padding:"8px 12px", background:msg.includes("✅")?C.accentDim:C.dangerDim, borderRadius:6, fontSize:12, color:msg.includes("✅")?C.accent:C.danger, marginBottom:12}}>{msg}</div>}

    <div style={{display:"flex", gap:8, marginBottom:12}}>
      <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 Search products..." style={{...inp, flex:1}}/>
      <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{...inp, width:"auto", cursor:"pointer"}}>
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="draft">Draft</option>
        <option value="archived">Archived</option>
      </select>
    </div>

    {loadingProducts && <Card><div style={{display:"flex", alignItems:"center", gap:10}}><div style={{width:8, height:8, borderRadius:"50%", background:C.accent, animation:"pulse 1s infinite"}}/><span style={{fontSize:12, color:C.muted}}>Loading from Shopify...</span></div></Card>}

    <div style={{display:"flex", flexDirection:"column", gap:6}}>
      {filtered.map(p => {
        const v = p.variants?.[0] || {};
        const imgUrl = p.image?.src;
        return <div key={p.id} style={{background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"12px 14px", display:"flex", alignItems:"center", gap:12}}>
          {imgUrl && <img src={imgUrl} alt={p.title} style={{width:44, height:44, objectFit:"cover", borderRadius:6, flexShrink:0}}/>}
          {!imgUrl && <div style={{width:44, height:44, background:C.bg, borderRadius:6, flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18}}>📦</div>}
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:13, color:C.text, fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{p.title}</div>
            <div style={{display:"flex", gap:8, marginTop:3, flexWrap:"wrap"}}>
              <span style={{fontSize:11, color:C.accent}}>${v.price}</span>
              {v.compare_at_price && <span style={{fontSize:11, color:C.muted, textDecoration:"line-through"}}>${v.compare_at_price}</span>}
              <span style={{fontSize:11, color:C.muted}}>{p.product_type||"—"}</span>
              <span style={{fontSize:11, color:v.inventory_quantity===0?C.danger:C.muted}}>Stock: {v.inventory_quantity??"?"}</span>
              {v.sku && <span style={{fontSize:10, color:C.muted, fontFamily:"monospace"}}>SKU: {v.sku}</span>}
            </div>
          </div>
          <div style={{display:"flex", gap:6, alignItems:"center", flexShrink:0}}>
            <button onClick={()=>toggleStatus(p)} style={{padding:"3px 10px", borderRadius:20, fontSize:11, cursor:"pointer", border:"none", background:p.status==="active"?C.accentDim:C.border, color:p.status==="active"?C.accent:C.muted}}>
              {p.status==="active"?"Active":"Draft"}
            </button>
            <button onClick={()=>startEdit(p)} style={{padding:"4px 10px", borderRadius:6, fontSize:11, cursor:"pointer", border:`1px solid ${C.border}`, background:"transparent", color:C.muted}}>Edit</button>
            <button onClick={()=>deleteProduct(p.id)} style={{background:"transparent", border:"none", color:C.danger, cursor:"pointer", fontSize:16, lineHeight:1}}>×</button>
          </div>
        </div>;
      })}
      {!loadingProducts && filtered.length === 0 && <div style={{textAlign:"center", padding:40, color:C.muted, fontSize:13}}>No products found</div>}
    </div>
  </div>;

  // EDIT VIEW
  if (view === "edit") return <div>
    <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:20}}>
      <button onClick={()=>setView("list")} style={{background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:18}}>←</button>
      <Label zh="编辑产品" en="Edit Product"/>
    </div>
    {msg && <div style={{padding:"8px 12px", background:msg.includes("✅")?C.accentDim:C.dangerDim, borderRadius:6, fontSize:12, color:msg.includes("✅")?C.accent:C.danger, marginBottom:12}}>{msg}</div>}
    <Card style={{marginBottom:12}}>
      <Label zh="基本信息" en="Basic Info"/>
      <div style={{display:"flex", flexDirection:"column", gap:10, marginTop:12}}>
        <input value={editForm.title||""} onChange={e=>setEditForm(f=>({...f,title:e.target.value}))} placeholder="Product Title" style={inp}/>
        <div style={{display:"flex", gap:8}}>
          <select value={editForm.status||"draft"} onChange={e=>setEditForm(f=>({...f,status:e.target.value}))} style={{...inp, flex:1, cursor:"pointer"}}>
            <option value="active">Active (Published)</option>
            <option value="draft">Draft (Hidden)</option>
            <option value="archived">Archived</option>
          </select>
          <input value={editForm.vendor||""} onChange={e=>setEditForm(f=>({...f,vendor:e.target.value}))} placeholder="Vendor/Brand" style={{...inp, flex:1}}/>
        </div>
        <input value={editForm.product_type||""} onChange={e=>setEditForm(f=>({...f,product_type:e.target.value}))} placeholder="Product Type/Category" style={inp}/>
        <input value={editForm.tags||""} onChange={e=>setEditForm(f=>({...f,tags:e.target.value}))} placeholder="Tags (comma separated)" style={inp}/>
      </div>
    </Card>
    <Card style={{marginBottom:12}}>
      <Label zh="价格 & 库存" en="Price & Inventory"/>
      <div style={{display:"flex", flexDirection:"column", gap:10, marginTop:12}}>
        <div style={{display:"flex", gap:8}}>
          <input value={editForm.price||""} onChange={e=>setEditForm(f=>({...f,price:e.target.value}))} placeholder="Price" style={{...inp, flex:1}}/>
          <input value={editForm.compare_at_price||""} onChange={e=>setEditForm(f=>({...f,compare_at_price:e.target.value}))} placeholder="Compare at Price" style={{...inp, flex:1}}/>
        </div>
        <div style={{display:"flex", gap:8}}>
          <input value={editForm.inventory_quantity??""} onChange={e=>setEditForm(f=>({...f,inventory_quantity:e.target.value}))} placeholder="Stock Quantity" style={{...inp, flex:1}} type="number"/>
          <input value={editForm.weight||""} onChange={e=>setEditForm(f=>({...f,weight:e.target.value}))} placeholder="Weight (kg)" style={{...inp, flex:1}}/>
        </div>
        <div style={{display:"flex", gap:8}}>
          <input value={editForm.sku||""} onChange={e=>setEditForm(f=>({...f,sku:e.target.value}))} placeholder="SKU" style={{...inp, flex:1, fontFamily:"monospace"}}/>
          <input value={editForm.barcode||""} onChange={e=>setEditForm(f=>({...f,barcode:e.target.value}))} placeholder="UPC/Barcode" style={{...inp, flex:1, fontFamily:"monospace"}}/>
        </div>
      </div>
    </Card>
    <div style={{display:"flex", gap:10}}>
      <Btn onClick={saveEdit} disabled={saving} style={{flex:1, padding:"11px"}}>{saving?"Saving...":"💾 Save Changes"}</Btn>
      <Btn onClick={()=>setView("list")} variant="ghost">Cancel</Btn>
    </div>
  </div>;

  // ADD VIEW
  if (view === "add") return <div>
    <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:20}}>
      <button onClick={()=>setView("list")} style={{background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:18}}>←</button>
      <Label zh="加新产品" en="Add New Product"/>
    </div>
    <div style={{display:"flex", gap:6, marginBottom:16}}>
      {[{id:"manual",zh:"Manual"},{id:"image",zh:"Image AI"},{id:"bulk",zh:"Bulk"}].map(m =>
        <button key={m.id} onClick={()=>setMode(m.id)} style={{flex:1, padding:"8px", borderRadius:6, cursor:"pointer", fontSize:11, border:"none", background:mode===m.id?C.accent:C.surface, color:mode===m.id?"#0A0A0F":C.muted}}>{m.zh}</button>
      )}
    </div>
    {mode==="manual" && <Card style={{marginBottom:12}}>
      <Label zh="产品信息" en="Product Info"/>
      <div style={{display:"flex", flexDirection:"column", gap:10, marginTop:12}}>
        {[
          {key:"name",ph:"Product Name *"},
          {key:"category",ph:"Category"},
          {key:"price",ph:"Price (e.g. 29.90)"},
          {key:"comparePrice",ph:"Compare at Price (optional)"},
          {key:"stock",ph:"Stock Quantity"},
          {key:"sku",ph:"SKU (auto-generate if blank)"},
          {key:"barcode",ph:"UPC/Barcode (auto-generate if blank)"},
          {key:"weight",ph:"Weight (e.g. 0.5)"},
          {key:"vendor",ph:"Vendor/Brand"},
          {key:"tags",ph:"Tags (comma separated)"},
          {key:"keywords",ph:"SEO Keywords"}
        ].map(f => <input key={f.key} value={form[f.key]} onChange={e=>setForm(x=>({...x,[f.key]:e.target.value}))} placeholder={f.ph} style={inp}/>)}
      </div>
    </Card>}
    {mode==="image" && <Card style={{marginBottom:12}}>
      <Label zh="上传图片" en="Upload Image"/>
      <div style={{marginTop:12}}>
        <label style={{display:"block", border:`2px dashed ${C.border}`, borderRadius:8, padding:"24px", textAlign:"center", cursor:"pointer"}}>
          {imgPrev ? <img src={imgPrev} alt="preview" style={{maxHeight:160, maxWidth:"100%", borderRadius:6}}/> : <div><div style={{fontSize:28, marginBottom:8}}>📷</div><div style={{fontSize:12, color:C.muted}}>Click to upload</div></div>}
          <input type="file" accept="image/*" onChange={handleImg} style={{display:"none"}}/>
        </label>
        <div style={{marginTop:10}}><TA value={imgDesc} onChange={setImgDesc} placeholder="Additional notes..." rows={2}/></div>
      </div>
    </Card>}
    {mode==="bulk" && <Card style={{marginBottom:12}}>
      <Label zh="批量" en="Bulk Input"/>
      <p style={{fontSize:11, color:C.muted, margin:"8px 0 10px"}}>One per line: Name, Category, Price</p>
      <TA value={bulk} onChange={setBulk} placeholder={"Coconut Oil 500ml, Health, 29.90\nCoconut Water, Drinks, 5.90"} rows={6}/>
    </Card>}
    <div style={{display:"flex", gap:10}}>
      <Btn onClick={generateDesc} disabled={loading||(mode==="manual"&&!form.name)||(mode==="image"&&!imgFile)||(mode==="bulk"&&!bulk)} style={{flex:1, padding:"11px"}}>
        {loading?"Generating...":"🤖 AI Generate Description"}
      </Btn>
    </div>
  </div>;

  // GENERATED VIEW
  if (view === "generated") return <div>
    <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:20}}>
      <button onClick={()=>setView("add")} style={{background:"transparent", border:"none", color:C.muted, cursor:"pointer", fontSize:18}}>←</button>
      <Label zh="AI 生成结果" en="Generated Description"/>
    </div>
    <Card style={{marginBottom:12}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14}}>
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          <div style={{width:7, height:7, borderRadius:"50%", background:C.accent, boxShadow:`0 0 6px ${C.accent}`}}/>
          <span style={{fontSize:11, color:C.accent, letterSpacing:1}}>AI GENERATED</span>
        </div>
        <CopyBtn text={gen}/>
      </div>
      <p style={{fontSize:13, lineHeight:1.9, color:"#C8C5BF", margin:0, whiteSpace:"pre-wrap"}}>{gen}</p>
    </Card>
    <div style={{display:"flex", gap:10}}>
      <Btn onClick={uploadToShopify} disabled={loading} style={{flex:1, padding:"11px"}}>🚀 Upload to Shopify</Btn>
      <Btn onClick={()=>setView("add")} variant="ghost">Regenerate</Btn>
    </div>
  </div>;
}


function SettingsTab() {
  const [key, setKey] = useState(getApiKey());
  const [saved, setSaved] = useState(false);
  const [show, setShow] = useState(false);
  const hasKey = getApiKey().length > 0;

  function save() {
    localStorage.setItem("coco_api_key", key);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  function clear() {
    localStorage.removeItem("coco_api_key");
    setKey("");
  }

  return <div>
    <div style={{marginBottom:16}}>
      <Label zh="设置" en="Settings"/>
    </div>
    <Card style={{marginBottom:12}}>
      <Label zh="Zoho Mail" en="Connected Accounts"/>
      <div style={{marginTop:12, display:"flex", flexDirection:"column", gap:8}}>
        {["sales@cocoislandmart.com","pan@cocoislandmart.com"].map((email,i) => <div key={i} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 12px", background:C.bg, borderRadius:6}}>
          <span style={{fontSize:12, color:C.text}}>{email}</span>
          <span style={{fontSize:11, padding:"2px 10px", borderRadius:20, background:C.accentDim, color:C.accent, border:"1px solid #1A4A35"}}>Connected</span>
        </div>)}
      </div>
    </Card>
    <Card>
      <Label zh="Cloudflare Worker" en="API Proxy"/>
      <div style={{marginTop:10, fontSize:12, color:C.muted}}>
        <p style={{marginBottom:6}}>Worker URL:</p>
        <code style={{fontSize:11, color:C.accent, background:C.bg, padding:"6px 10px", borderRadius:4, display:"block"}}>{WORKER}</code>
        <p style={{marginTop:8, fontSize:11}}>✅ Zoho Token auto-refresh enabled · ✅ Claude AI proxy enabled</p>
      </div>
    </Card>
  </div>;
}

function App() {
  const [activeTab,setActiveTab] = useState("overview");

  return <div style={{minHeight:"100vh", background:C.bg, color:C.text}}>
    <div style={{borderBottom:`1px solid ${C.border}`, padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
      <div>
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          <div style={{width:7, height:7, borderRadius:"50%", background:C.accent, boxShadow:`0 0 8px ${C.accent}`}}/>
          <span style={{fontSize:10, letterSpacing:3, color:C.muted, textTransform:"uppercase"}}>Coco Island Mart · Store Manager</span>
        </div>
        <h1 style={{fontSize:18, fontWeight:"normal", margin:"4px 0 0", fontFamily:"Georgia,serif", color:C.text}}>Shopify Dashboard</h1>
      </div>
      <div style={{padding:"4px 12px", background:C.accentDim, border:`1px solid #1A4A35`, borderRadius:20, fontSize:10, color:C.accent, letterSpacing:1}}>LIVE</div>
    </div>
    <div style={{display:"flex", borderBottom:`1px solid ${C.border}`, padding:"0 20px", overflowX:"auto"}}>
      {tabs.map(t => <button key={t.id} onClick={()=>setActiveTab(t.id)}
        style={{padding:"12px 14px", background:"transparent", border:"none", borderBottom:`2px solid ${activeTab===t.id?C.accent:"transparent"}`, color:activeTab===t.id?C.accent:C.muted, fontSize:11, cursor:"pointer", transition:"all .15s", whiteSpace:"nowrap"}}>
        <span style={{marginRight:5}}>{t.icon}</span>{t.zh}
      </button>)}
    </div>
    <div style={{padding:20, maxWidth: activeTab==="email"?1000:640, margin:"0 auto"}}>
      {activeTab==="overview" && <Overview setTab={setActiveTab}/>}
      {activeTab==="email" && <EmailTab/>}
      {activeTab==="delivery" && <DeliveryTab/>}
      {activeTab==="marketing" && <MarketingTab/>}
      {activeTab==="products" && <ProductsTab/>}
      {activeTab==="settings" && <SettingsTab/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
